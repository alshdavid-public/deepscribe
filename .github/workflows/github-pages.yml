name: Deploy to Github Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "main"
  cancel-in-progress: true

jobs:
  deploy:
    # environment:
      # name: github-pages
      # url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p $HOME/.local/nodejs && curl -L https://github.com/alshdavid/xpkg/releases/download/nodejs-latest/nodejs-linux-amd64.tar.gz | tar -xzf - -C $HOME/.local/nodejs && echo "$HOME/.local/nodejs/bin" >> $GITHUB_PATH
      - run: mkdir -p $HOME/.local/terraform && curl -L https://github.com/alshdavid/xpkg/releases/download/terraform-latest/terraform-linux-amd64.tar.gz | tar -xzf - -C $HOME/.local/terraform && echo "$HOME/.local/terraform" >> $GITHUB_PATH
      - run: terraform --version
      - run: aws --version
